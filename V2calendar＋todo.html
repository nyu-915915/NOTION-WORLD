<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Todo Calendar</title>

<style>

body{
    background:#111;
    color:white;
    font-family:sans-serif;

    display:flex;
    flex-direction:column;
    align-items:center;

    gap:30px;
    padding:30px;
}

/* カレンダー */

.calendar{
    width:320px;
    background:#1e1e1e;
    padding:20px;
    border-radius:20px;
}
    
.calendar-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.calendar-header button{
    background:#2a2a2a;
    color:white;
    border:none;

    width:35px;
    height:35px;

    border-radius:10px;

    cursor:pointer;
}


.days{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:10px;
    margin-top:20px;
}

.day{
    aspect-ratio:1;

    display:flex;
    align-items:center;
    justify-content:center;

    background:#2a2a2a;
    border-radius:10px;

    cursor:pointer;
    position:relative;
}

.weekdays{
    display:grid;
    grid-template-columns:repeat(7,1fr);

    margin-top:20px;
    text-align:center;

    opacity:0.7;
    font-size:14px;
}

    
/* 今日 */
.today{
    background:#ff6ba6;
    color:white;
    box-shadow:
        0 0 10px #ff6ba6,
        0 0 20px #ff6ba6;
}



/* TODOある日 */

.has-todo::after{
    content:"•";
    color:#ff6ba6;

    position:absolute;
    bottom:5px;
    font-size:12px;
}

/* TODOリスト */

.todo-section{
    width:320px;
    background:#1e1e1e;
    padding:20px;
    border-radius:20px;
}

.todo-item{
    display:flex;
    gap:10px;
    margin-top:15px;
}

/* ポップアップ */

.popup{
    position:fixed;
    inset:0;

    background:rgba(0,0,0,0.5);

    display:none;
    align-items:center;
    justify-content:center;
}

.popup-content{
    background:#222;
    padding:20px;
    border-radius:20px;
    width:250px;
}

.close{
    margin-top:20px;
    cursor:pointer;
}

</style>
</head>

<body>

<!-- カレンダー -->

<div class="calendar">

<div class="calendar-header">

<button id="prevBtn">&lt;</button>

<h2 id="monthTitle"></h2>

<button id="nextBtn">&gt;</button>

</div>

<div class="weekdays">

<div>Sun</div>
<div>Mon</div>
<div>Tue</div>
<div>Wed</div>
<div>Thu</div>
<div>Fri</div>
<div>Sat</div>

</div>


<div class="days" id="days"></div>

</div>

<!-- TODO一覧 -->

<div class="todo-section">

<h2>&lt; Todo &gt;</h2>

<div class="todo-item">
<input type="checkbox">
<span>面接準備</span>
</div>

<div class="todo-item">
<input type="checkbox">
<span>FP勉強</span>
</div>

<div class="todo-item">
<input type="checkbox">
<span>部屋片付け</span>
</div>

</div>

<!-- ポップアップ -->

<div class="popup" id="popup">

<div class="popup-content">

<h3 id="popup-date"></h3>

<div id="popup-todos"></div>

<div class="close" onclick="closePopup()">
閉じる
</div>

</div>

</div>

<script>

/* TODOデータ */

const todos = {
    3:["FP勉強"],
    6:["面接準備","スーツ確認"],
    15:["ネイル予約"]
};
/* 今日の日付取得 */

const today = new Date();
let currentMonth = today.getMonth();
const currentDate = today.getDate();

/* 月の名前 */
const monthNames = [
    "January",
    "February",
    "March",
    "April",
    "May",
    "June",
    "July",
    "August",
    "September",
    "October",
    "November",
    "December"
];



const daysContainer = document.getElementById("days");
function renderCalendar(){

    /* タイトル変更 */

    document.getElementById("monthTitle").textContent =
        monthNames[currentMonth];

    /* リセット */

    daysContainer.innerHTML = "";

    /* 月初の曜日 */

const firstDay = new Date(
    today.getFullYear(),
    currentMonth,
    1
).getDay();

/* 空白追加 */

for(let i=0; i<firstDay; i++){

    const empty = document.createElement("div");

    daysContainer.appendChild(empty);

}


    /* 月の日数 */

    const lastDay = new Date(
        today.getFullYear(),
        currentMonth + 1,
        0
    ).getDate();

    /* 日付生成 */

    for(let i=1; i<=lastDay; i++){

        const day = document.createElement("div");

        day.classList.add("day");

        day.textContent = i;

        /* 今日 */

        if(
            i === currentDate &&
            currentMonth === today.getMonth()
        ){
            day.classList.add("today");
        }

        /* TODOある日 */
        if(todos[i]){
            day.classList.add("has-todo");
            day.addEventListener("click", ()=>{
                openPopup(i);

            });
        }
        daysContainer.appendChild(day);
    }
}
/* 最初に表示 */
renderCalendar();
    


/* ポップアップ */

function openPopup(day){

    document.getElementById("popup").style.display="flex";

    document.getElementById("popup-date").textContent =
        `${day}日のTodo`;

    const list = document.getElementById("popup-todos");

    list.innerHTML="";

    todos[day].forEach(todo=>{

        const p = document.createElement("p");

        p.textContent="・"+todo;

        list.appendChild(p);

    });
}

function closePopup(){

    document.getElementById("popup").style.display="none";

}


    /* 前月 */
document.getElementById("prevBtn")
.addEventListener("click", ()=>{

    currentMonth--;

    if(currentMonth < 0){
        currentMonth = 11;
    }

    renderCalendar();

});

/* 次月 */
document.getElementById("nextBtn")
.addEventListener("click", ()=>{

    currentMonth++;

    if(currentMonth > 11){
        currentMonth = 0;
    }

    renderCalendar();

});


</script>

</body>
</html>
