<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Calendar</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Noto+Sans+JP&display=swap" rel="stylesheet">

  <link href="https://fonts.googleapis.com/css2?family=Playfair Display:ital,wght@0,300;0,400;1,400;0,500;0,600;0,900&display=swap" rel="stylesheet">

  <style>
    body {
      background: #00000000;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: sans-serif;
    }

    .calendar {
      width: 260px;
      padding: 10px;
      background: #374151;
      border-radius: 20px;
    }

    .header {
      text-align: left;
      font-size: 20px;
      margin-bottom: 10px;
     font-family: 'Playfair Display', serif;
　　  font-weight: 400;
   font-style: italic;
    }

    .days, .dates {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
    }

    .days div {
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 5px;
     font-family: 'Playfair Display', serif;
    }

    .dates div {
      padding: 3px 0;
      margin: 2px;
      border-radius: 8px;
    }

    .dates div:hover {
      background: #1f2937;
    }

    .day {
     position: relative;
     height: 15px;
     display: flex;
     align-items: center;
     justify-content: center;
     font-family: 'Playfair Display', serif;
    }

    .date-number {
     z-index: 1;
    }

    .star {
     position: absolute;
     top: -12px;
     right: -6px;
     font-size: 30px;
     color: #de9fe0;
     filter: drop-shadow(0 0 5px #60a5fa);
     filter: drop-shadow(0 0 5px #eacceb);
    }

  </style>

</head>

<body>

  <div class="calendar">
    <div class="header">May 2026</div>

  <div class="days">
  <div>S</div><div>M</div><div>T</div>
  <div>W</div><div>T</div><div>F</div><div>S</div>
  </div>

  <div class="dates" id="dates"></div>
  </div>

  <div id="todoBox" style="margin-top:20px; color:#e5e7eb;">
  <h3>Todo</h3>
  <div id="todoList">日付をクリックしてね</div>
  </div>


 <script>
  const datesContainer = document.getElementById("dates");
  const header = document.querySelector(".header");

  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth(); // 0〜11
  const today = now.getDate();

  const todos = [
  {
    date: "2026-05-10",
    tasks: ["サブスク解禁"]
  },
  {
    date: "2026-05-15",
    tasks: ["デビュー日"]
  }
　];


  // 月の名前（英語）
  const monthNames = [
    "January","Febrary","March","April","May","June",
    "July","August","September","October","November","December"
  ];

  // ヘッダー更新
  header.textContent = `${monthNames[month]} ${year}`;

  // 今月の日数を取得
  const lastDate = new Date(year, month + 1, 0).getDate();

  // 月初の曜日（0=日曜）
  const firstDay = new Date(year, month, 1).getDay();

  // 空白埋める
  for (let i = 0; i < firstDay; i++) {
    const empty = document.createElement("div");
    datesContainer.appendChild(empty);
  }
   
function showTodos(date) {
  const todo = todos.find(t => t.date === date);
  const box = document.getElementById("todoList");

  if (todo) {
    box.innerHTML = todo.tasks.map(t => `<div>・${t}</div>`).join("");
  } else {
    box.innerHTML = "予定なし";
  }
}


for (let i = 1; i <= lastDate; i++) {
  const day = document.createElement("div");
  day.classList.add("day");

  const fullDate = `${year}-${String(month+1).padStart(2,"0")}-${String(i).padStart(2,"0")}`;

  // TODOあるかチェック
  const hasTodo = todos.some(t => t.date === fullDate);

  if (i === today) {
    day.innerHTML = `
      <span class="date-number">${i}</span>
      <span class="star">★</span>
    `;
  } else {
    day.innerHTML = `<span class="date-number">${i}</span>`;
  }

  // TODOある日 → ちょいマーク
  if (hasTodo) {
    day.style.border = "1px solid #9ca3af";
  }

  // クリックで表示
  day.addEventListener("click", () => {
    showTodos(fullDate);
  });

  datesContainer.appendChild(day);
}


</script>




</body>
</html>
