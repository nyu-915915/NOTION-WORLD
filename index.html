<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Calendar</title>
  <style>
    body {
      background: #0f172a; /* ダークネイビー */
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: sans-serif;
    }

    .calendar {
      width: 200px;
      padding: 15px;
      background: #111827;
      border-radius: 15px;
    }

    .header {
      text-align: left;
      font-size: 18px;
      margin-bottom: 10px;
    }

    .days, .dates {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
    }

    .days div {
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 5px;
    }

    .dates div {
      padding: 10px 0;
      margin: 2px;
      border-radius: 8px;
    }

    .dates div:hover {
      background: #1f2937;
    }
.day {
  position: relative;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.date-number {
  z-index: 1;
}

.star {
  position: absolute;
  top: 10px;
  right: 4px;
  font-size: 30px;
  color: #60a5fa;
}
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Noto+Sans+JP&display=swap" rel="stylesheet">
  </style>
</head>
<body>

  <div class="calendar">
    <div class="header">May 2026</div>

    <div class="days">
      <div>S</div><div>M</div><div>T</div>
      <div>W</div><div>T</div><div>F</div><div>S</div>
    </div>

    <div class="dates" id="dates"></div>
  </div>

 <script>
  const datesContainer = document.getElementById("dates");
  const header = document.querySelector(".header");

  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth(); // 0〜11
  const today = now.getDate();

  // 月の名前（英語）
  const monthNames = [
    "January","February","March","April","May","June",
    "July","August","September","October","November","December"
  ];

  // ヘッダー更新
  header.textContent = `${monthNames[month]} ${year}`;

  // 今月の日数を取得
  const lastDate = new Date(year, month + 1, 0).getDate();

  // 月初の曜日（0=日曜）
  const firstDay = new Date(year, month, 1).getDay();

  // 空白埋める
  for (let i = 0; i < firstDay; i++) {
    const empty = document.createElement("div");
    datesContainer.appendChild(empty);
  }

  // 日付生成
  for (let i = 1; i <= lastDate; i++) {
    const day = document.createElement("div");
    day.classList.add("day");

    if (i === today) {
      day.innerHTML = `
        <span class="date-number">${i}</span>
        <span class="star">★</span>
      `;
    } else {
      day.innerHTML = `<span class="date-number">${i}</span>`;
    }

    datesContainer.appendChild(day);
  }

   .header {
  font-family: 'Playfair Display', serif;
}

.day {
  font-family: 'Noto Sans JP', sans-serif;
}

</script>




</body>
</html>
